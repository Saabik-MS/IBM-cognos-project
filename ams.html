<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrandStay Pro Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f4f6f9; }

/* Login */
#loginPage {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#667eea,#764ba2);
}
.login-box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 15px;
  width: 320px;
  color: white;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.login-box input {
  width: 100%; padding: 12px; margin: 10px 0;
  border-radius: 8px; border: none;
}
.login-box button {
  width: 100%; padding: 12px;
  background: #00c6ff; border: none;
  color: white; border-radius: 8px;
  cursor: pointer; font-weight: 600;
}

/* Layout */
#dashboard { display: none; }
.sidebar {
  width: 240px; height: 100vh;
  background: #1f2937; color: white;
  position: fixed; padding: 20px;
}
.sidebar h2 { margin-bottom: 20px; }
.sidebar ul { list-style: none; }
.sidebar li {
  padding: 12px; border-radius: 8px;
  margin-bottom: 10px; cursor: pointer;
}
.sidebar li:hover { background: #374151; }

.main {
  margin-left: 260px;
  padding: 25px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.filters select {
  padding: 8px; margin-left: 10px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}
.card h3 { color: #6b7280; font-size: 14px; }
.card p { font-size: 22px; font-weight: 600; }

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  margin-top: 20px;
}
.chart-box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.table-box {
  margin-top: 20px;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; text-align: left; }
th { background: #f3f4f6; }

</style>
</head>
<body>

<!-- Login -->
<div id="loginPage">
  <div class="login-box">
    <h2>GrandStay</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="sidebar">
    <h2>GrandStay</h2>
    <ul>
      <li>Dashboard</li>
      <li>Revenue</li>
      <li>Occupancy</li>
      <li>Guests</li>
      <li onclick="logout()">Logout</li>
    </ul>
  </div>

  <div class="main">
    <div class="header">
      <h1>Revenue Dashboard</h1>
      <div class="filters">
        Property:
        <select>
          <option>All</option>
          <option>Chennai</option>
          <option>Goa</option>
        </select>
        Month:
        <select>
          <option>All</option>
          <option>Jan</option>
          <option>Feb</option>
        </select>
      </div>
    </div>

    <div class="cards">
      <div class="card"><h3>Total Revenue</h3><p>₹12.5L</p></div>
      <div class="card"><h3>Occupancy</h3><p>78%</p></div>
      <div class="card"><h3>Avg Rating</h3><p>4.3 ⭐</p></div>
      <div class="card"><h3>RevPAR</h3><p>₹4500</p></div>
    </div>

    <div class="grid">
      <div class="chart-box">
        <h3>Monthly Revenue</h3>
        <canvas id="barChart"></canvas>
      </div>
      <div class="chart-box">
        <h3>Booking Channels</h3>
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <div class="chart-box" style="margin-top:20px;">
      <h3>Occupancy Trend</h3>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="table-box">
      <h3>Top Guests</h3>
      <table>
        <tr><th>Name</th><th>Spend</th></tr>
        <tr><td>Rahul</td><td>₹50,000</td></tr>
        <tr><td>Anita</td><td>₹45,000</td></tr>
      </table>
    </div>

  </div>
</div>

<script>
function login(){
  if(username.value==='Grandstay' && password.value==='1234'){
    loginPage.style.display='none';
    dashboard.style.display='block';
    loadCharts();
  } else error.innerText='Invalid Login';
}
function logout(){ dashboard.style.display='none'; loginPage.style.display='flex'; }

function loadCharts(){
  new Chart(barChart,{type:'bar',data:{labels:['Jan','Feb','Mar'],datasets:[{label:'Revenue',data:[20,30,40]}]}});
  new Chart(pieChart,{type:'pie',data:{labels:['Online','Agent','Walk-in'],datasets:[{data:[50,30,20]}]}});
  new Chart(lineChart,{type:'line',data:{labels:['Jan','Feb','Mar'],datasets:[{label:'Occupancy',data:[60,75,80]}]}});
}
</script>

</body>
</html>
